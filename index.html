<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailPro — Smart Retail Billing Software</title>
    <meta name="description" content="Complete retail billing, inventory management, and point-of-sale solution for modern businesses.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="logo-text">RetailPro</span>
                </div>
                <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <div class="nav-section-label">MAIN</div>
                <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="billing" id="nav-billing">
                    <i class="fas fa-calculator"></i>
                    <span>POS / Billing</span>
                </a>
                <div class="nav-section-label">MANAGEMENT</div>
                <a href="#" class="nav-item" data-page="products" id="nav-products">
                    <i class="fas fa-box"></i>
                    <span>Products</span>
                </a>
                <a href="#" class="nav-item" data-page="categories" id="nav-categories">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
                <a href="#" class="nav-item" data-page="inventory" id="nav-inventory">
                    <i class="fas fa-warehouse"></i>
                    <span>Inventory</span>
                </a>
                <div class="nav-section-label">RECORDS</div>
                <a href="#" class="nav-item" data-page="invoices" id="nav-invoices">
                    <i class="fas fa-file-invoice"></i>
                    <span>Invoices</span>
                </a>
                <a href="#" class="nav-item" data-page="customers" id="nav-customers">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
                <div class="nav-section-label">ANALYTICS</div>
                <a href="#" class="nav-item" data-page="reports" id="nav-reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" data-page="settings" id="nav-settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="store-badge">
                    <i class="fas fa-store"></i>
                    <span id="sidebar-store-name">My Store</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <header class="top-bar" id="top-bar">
                <div class="top-bar-left">
                    <button id="mobile-menu-toggle" class="mobile-menu-toggle" aria-label="Open menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="page-title" class="page-title">Dashboard</h1>
                </div>
                <div class="top-bar-right">
                    <div class="search-box" id="global-search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="global-search" placeholder="Search products, customers..." autocomplete="off">
                        <div class="search-results" id="search-results"></div>
                    </div>
                    <div class="top-bar-actions">
                        <button class="action-btn" id="notification-btn" aria-label="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="badge" id="notification-badge" style="display:none;">0</span>
                        </button>
                        <button class="action-btn quick-sale-btn" id="quick-sale-btn" aria-label="Quick Sale">
                            <i class="fas fa-plus"></i>
                            <span>New Sale</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="page-content" id="page-content">
                <!-- Dynamic content rendered by JS -->
            </div>
        </main>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal-container" class="modal-container">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button id="modal-close" class="modal-close-btn" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div id="modal-footer" class="modal-footer"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Notification Panel -->
    <div id="notification-panel" class="notification-panel" style="display:none;">
        <div class="notification-panel-header">
            <h3>Notifications</h3>
            <button id="clear-notifications" class="clear-notifications-btn">Clear All</button>
        </div>
        <div id="notification-list" class="notification-list"></div>
    </div>

    <!-- Print Container -->
    <div id="print-area" class="print-area"></div>

    <!-- Hidden file inputs -->
    <input type="file" id="csv-upload-input" accept=".csv" style="display:none;">
    <input type="file" id="backup-restore-input" accept=".json" style="display:none;">
    <input type="file" id="logo-upload-input" accept="image/*" style="display:none;">

    <script src="js/store.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/pages2.js"></script>
    <script src="js/pages3.js"></script>
    <script src="js/core.js"></script>
</body>
</html>
